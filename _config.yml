title: "Abdullah Ahmad Mirza"
name: "Abdullah Ahmad Mirza"
url: "https://abdullahahmad88.github.io"
baseurl: "/my_new_site-" # Change this if your repository name is different
repository: "AbdullahAhmad88/my_new_site-"

# Theme Configuration
remote_theme: "mmistakes/minimal-mistakes@4.24.4"
minimal_mistakes_skin: "contrast"

# Required Plugins
plugins:
  - jekyll-remote-theme
  - jekyll-include-cache

# Author Sidebar (Matches your previous credentials)
author:
  name: "Abdullah Ahmad Mirza"
  bio: "BS Computer Engineering | UET Faisalabad (Section A)"
  location: "Faisalabad, Pakistan"
  links:
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/abdullah-ahmad-mirza-2b9656378"

# Navigation Menu
header:
  nav_links:
    - title: "Home"
      url: "/"
    - title: "About"
      url: "/about/"
    - title: "Blog"
      url: "/blog/"
    - title: "Contact"
      url: "/contact/"

# Default Layouts
defaults:
  - scope:
      path: ""
    values:
      layout: "single"
      author_profile: true
